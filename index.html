<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автоформатирование документов</title>
    <link rel="stylesheet" href="style.css">
    <!-- применяем сохранённую тему сразу, до отрисовки (без мигания) -->
    <script>
        (function () {
            try {
                var t = localStorage.getItem('docfmt-theme');
                if (t && t !== 'light') document.documentElement.setAttribute('data-theme', t);
            } catch (e) {}
        })();
    </script>
</head>
<body>
    <div class="container">
        <!-- Переключатель тем -->
        <div class="theme-switch">
            <label for="themeSelect">Тема:</label>
            <select id="themeSelect" onchange="setTheme(this.value)">
                <option value="light">Светлая</option>
                <option value="dark">Тёмная</option>
                <option value="warm">Тёплая</option>
                <option value="mono">Чёрно-белая</option>
            </select>
        </div>

        <h1>Автоформатирование документов</h1>

        <!-- Выбор файла -->
        <div class="section">
            <label class="section-title">Выберите файл</label>
            <div class="file-upload">
                <input type="file" id="fileInput" accept=".docx">
                <label for="fileInput" class="file-btn">📁 Выбрать файл .docx</label>
                <span id="fileName">Файл не выбран</span>
            </div>
        </div>

        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab active" onclick="showTab('formatting')">Форматирование</button>
            <button class="tab" onclick="showTab('margins')">Поля страницы</button>
            <button class="tab" onclick="showTab('headers')">Колонтитулы</button>
        </div>

        <!-- Вкладка: Форматирование -->
        <div id="formatting" class="tab-content active">
            <div class="form-grid">
                <div class="form-group">
                    <label>Шрифт:</label>
                    <input type="text" id="fontName" value="Times New Roman" list="fontList">
                    <datalist id="fontList">
                        <option value="Times New Roman">
                        <option value="Arial">
                        <option value="Calibri">
                        <option value="Georgia">
                        <option value="Verdana">
                        <option value="Tahoma">
                        <option value="Courier New">
                        <option value="Garamond">
                    </datalist>
                </div>
                <div class="form-group">
                    <label>Размер текста:</label>
                    <select id="fontSize">
                        <option>10</option>
                        <option>11</option>
                        <option>12</option>
                        <option>13</option>
                        <option value="14" selected>14</option>
                        <option>16</option>
                        <option>18</option>
                        <option>20</option>
                        <option>24</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Выравнивание:</label>
                    <select id="alignment">
                        <option>По левому краю</option>
                        <option>По центру</option>
                        <option>По правому краю</option>
                        <option selected>По ширине</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Межстрочный интервал:</label>
                    <select id="lineSpacing">
                        <option>1.0</option>
                        <option selected>1.5</option>
                        <option>2.0</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Красная строка (см):</label>
                    <input type="number" id="firstIndent" value="1.25" step="0.25">
                </div>
            </div>
        </div>

        <!-- Вкладка: Поля страницы -->
        <div id="margins" class="tab-content">
            <div class="form-grid">
                <div class="form-group">
                    <label>Верхнее (см):</label>
                    <select id="marginTop">
                        <option>1</option>
                        <option selected>2</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Нижнее (см):</label>
                    <select id="marginBottom">
                        <option>1</option>
                        <option selected>2</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Левое (см):</label>
                    <select id="marginLeft">
                        <option>2.5</option>
                        <option selected>3</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Правое (см):</label>
                    <select id="marginRight">
                        <option selected>1.5</option>
                        <option>2.5</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Вкладка: Колонтитулы -->
        <div id="headers" class="tab-content">
            <div class="form-grid">
                <div class="form-group">
                    <label>Верхний колонтитул (1-я страница):</label>
                    <input type="text" id="headerFirst" placeholder="Например: 2026">
                </div>
                <div class="form-group">
                    <label>Нижний колонтитул (1-я страница):</label>
                    <input type="text" id="footerFirst" placeholder="Например: город">
                </div>
                <div class="form-group">
                    <label>Верхний колонтитул (остальные страницы):</label>
                    <input type="text" id="headerOther" placeholder="Например: название работы">
                </div>
                <div class="form-group">
                    <label>Нижний колонтитул (остальные страницы):</label>
                    <input type="text" id="footerOther" placeholder="Например: название кафедры">
                </div>
                <div class="form-group">
                    <label>Нумерация страниц:</label>
                    <select id="pageNumbers">
                        <option selected>Не добавлять</option>
                        <option>Внизу по центру</option>
                        <option>Внизу справа</option>
                        <option>Вверху по центру</option>
                        <option>Вверху справа</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Кнопка применить -->
        <button class="apply-btn" onclick="applyFormatting()">✔ Применить форматирование</button>
        <div id="status" class="status"></div>
    </div>

    <script src="https://unpkg.com/pizzip@3.1.3/dist/pizzip.js"></script>
    <script src="https://unpkg.com/docxtemplater@3.44.0/build/docxtemplater.js"></script>
    <script src="app.js"></script>
</body>
</html>
